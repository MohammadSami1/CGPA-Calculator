<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CGPA Calculator | by SAMI</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Poppins:wght@300;400;500;600;700&family=Hind+Siliguri:wght@400;500;600;700&family=Crimson+Text:wght@400;600;700&family=Mongolian+Baiti&display=swap" rel="stylesheet">
<style>
  :root {
    --bg1: #0f0c29;
    --bg2: #302b63;
    --bg3: #24243e;
    --neon-cyan: #00f5ff;
    --neon-pink: #ff00e6;
    --neon-purple: #8a2be2;
    --neon-green: #39ff14;
    --card-bg: rgba(20, 18, 45, 0.75);
    --text-light: #f0f0ff;
  }

  * { box-sizing: border-box; }

  body {
    font-family: 'Poppins', 'Hind Siliguri', sans-serif;
    margin: 0;
    min-height: 100vh;
    color: var(--text-light);
    background: linear-gradient(-45deg, var(--bg1), var(--bg2), var(--bg3), #1b1b3a);
    background-size: 400% 400%;
    animation: gradientShift 18s ease infinite;
    padding: 20px;
    position: relative;
    overflow-x: hidden;
  }

  @keyframes gradientShift {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }

  body::before, body::after {
    content: '';
    position: fixed;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.35;
    z-index: 0;
    pointer-events: none;
  }
  body::before {
    width: 350px; height: 350px;
    background: var(--neon-cyan);
    top: -100px; left: -100px;
    animation: float1 14s ease-in-out infinite;
  }
  body::after {
    width: 400px; height: 400px;
    background: var(--neon-pink);
    bottom: -120px; right: -120px;
    animation: float2 16s ease-in-out infinite;
  }
  @keyframes float1 {
    0%, 100% { transform: translate(0,0); }
    50% { transform: translate(80px, 60px); }
  }
  @keyframes float2 {
    0%, 100% { transform: translate(0,0); }
    50% { transform: translate(-60px, -80px); }
  }

  .container {
    max-width: 950px;
    margin: 0 auto;
    background: var(--card-bg);
    border-radius: 20px;
    padding: 28px;
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.08);
    box-shadow: 0 0 40px rgba(0, 245, 255, 0.15), 0 0 80px rgba(255, 0, 230, 0.08);
    position: relative;
    z-index: 1;
    animation: fadeInUp 0.8s ease;
  }

  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
  }

  h1.heading {
    text-align: center;
    font-family: 'Orbitron', sans-serif;
    font-weight: 900;
    font-size: clamp(1.6rem, 5vw, 2.6rem);
    letter-spacing: 2px;
    margin: 0 0 6px;
    background: linear-gradient(90deg, var(--neon-cyan), var(--neon-pink), var(--neon-purple), var(--neon-cyan));
    background-size: 300% 100%;
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    color: transparent;
    animation: shine 6s linear infinite;
    text-shadow: 0 0 25px rgba(0, 245, 255, 0.35);
    text-transform: uppercase;
  }

  @keyframes shine {
    0% { background-position: 0% 50%; }
    100% { background-position: 300% 50%; }
  }

  .subheading {
    text-align: center;
    font-family: 'Hind Siliguri', sans-serif;
    font-size: 0.95rem;
    color: #b8b8e8;
    margin: 0 0 22px;
    letter-spacing: 0.5px;
  }

  .table-wrap {
    overflow-x: auto;
    border-radius: 12px;
  }
  table {
    width: 100%;
    border-collapse: collapse;
    min-width: 700px;
  }
  th, td {
    padding: 12px 10px;
    text-align: center;
    font-size: 0.88rem;
    border-bottom: 1px solid rgba(255,255,255,0.08);
  }
  th {
    background: linear-gradient(135deg, rgba(0,245,255,0.15), rgba(255,0,230,0.15));
    color: var(--neon-cyan);
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1px;
    font-size: 0.78rem;
    position: sticky;
    top: 0;
  }
  td.title {
    text-align: left;
    font-weight: 400;
    color: #e6e6ff;
    font-family: 'Mongolian Baiti', 'Hind Siliguri', sans-serif;
    font-size: 0.92rem;
  }
  td.code {
    font-size: 0.75rem;
    color: #ffffff;
    font-family: 'Times New Roman', Times, serif;
  }
  tbody tr { transition: background 0.25s ease; }
  tbody tr:hover { background: rgba(255,255,255,0.04); }
  tfoot td {
    font-weight: 700;
    background: rgba(255,255,255,0.05);
    color: var(--neon-green);
    font-size: 0.95rem;
  }

  .gpa-control {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    justify-content: center;
  }
  .gpa-value {
    font-family: 'Crimson Text', serif;
    font-weight: 700;
    font-size: 1.05rem;
    min-width: 50px;
    text-align: center;
    color: #fff;
    background: rgba(255,255,255,0.06);
    border-radius: 8px;
    padding: 6px 4px;
    border: 1px solid rgba(255,255,255,0.1);
  }
  .gpa-btn {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    border: 1.5px solid var(--neon-cyan);
    background: rgba(0, 245, 255, 0.06);
    color: var(--neon-cyan);
    font-family: 'Orbitron', sans-serif;
    font-size: 1.1rem;
    font-weight: 700;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s ease;
    box-shadow: 0 0 8px rgba(0, 245, 255, 0.25);
    flex-shrink: 0;
  }
  .gpa-btn:active { transform: scale(0.9); }
  .gpa-btn.plus {
    border-color: var(--neon-green);
    color: var(--neon-green);
    box-shadow: 0 0 8px rgba(57, 255, 20, 0.25);
  }
  .gpa-btn.minus {
    border-color: var(--neon-pink);
    color: var(--neon-pink);
    box-shadow: 0 0 8px rgba(255, 0, 230, 0.25);
  }
  .gpa-btn.plus:hover {
    background: var(--neon-green);
    color: #0f0c29;
    box-shadow: 0 0 18px rgba(57, 255, 20, 0.7);
  }
  .gpa-btn.minus:hover {
    background: var(--neon-pink);
    color: #0f0c29;
    box-shadow: 0 0 18px rgba(255, 0, 230, 0.7);
  }

  .result {
    margin-top: 24px;
    padding: 22px;
    text-align: center;
    border-radius: 16px;
    background: rgba(0,0,0,0.25);
    border: 1px solid rgba(0, 245, 255, 0.3);
    box-shadow: 0 0 25px rgba(0, 245, 255, 0.2), inset 0 0 25px rgba(255,0,230,0.05);
    position: relative;
    overflow: hidden;
  }
  .result-label {
    font-family: 'Hind Siliguri', sans-serif;
    font-size: 0.95rem;
    color: #c0c0e8;
    letter-spacing: 1px;
    margin-bottom: 6px;
  }
  .result-value {
    font-family: 'Orbitron', sans-serif;
    font-weight: 900;
    font-size: clamp(2.4rem, 10vw, 4rem);
    background: linear-gradient(90deg, var(--neon-green), var(--neon-cyan));
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    color: transparent;
    text-shadow: 0 0 30px rgba(57,255,20,0.4);
    transition: all 0.3s ease;
  }
  .result-sub {
    margin-top: 8px;
    font-size: 0.8rem;
    color: #9a9ac8;
  }

  .mobile-list { display: none; }
  .course-card {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 14px;
    padding: 14px;
    margin-bottom: 12px;
    transition: border-color 0.2s ease;
  }
  .course-card:active { border-color: var(--neon-cyan); }
  .course-card .ct-title {
    font-weight: 500;
    font-size: 0.95rem;
    color: #f0f0ff;
    margin-bottom: 4px;
    font-family: 'Mongolian Baiti', 'Hind Siliguri', sans-serif;
  }
  .course-card .ct-meta {
    font-size: 0.72rem;
    color: #ffffff;
    margin-bottom: 10px;
    font-family: 'Times New Roman', Times, serif;
  }
  .course-card .ct-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .course-card .ct-point {
    font-family: 'Orbitron', sans-serif;
    font-weight: 700;
    color: var(--neon-green);
    font-size: 0.95rem;
  }

  .footer {
    margin-top: 28px;
    text-align: center;
    padding-top: 18px;
    border-top: 1px solid rgba(255,255,255,0.08);
  }
  .footer .made-by {
    font-family: 'Orbitron', sans-serif;
    font-size: 0.85rem;
    letter-spacing: 3px;
    color: #c0c0e8;
    margin-bottom: 12px;
  }
  .footer .made-by span {
    background: linear-gradient(90deg, var(--neon-cyan), var(--neon-pink));
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    color: transparent;
    font-weight: 900;
  }
  .social-links {
    display: flex;
    justify-content: center;
    gap: 14px;
    flex-wrap: wrap;
  }
  .social-links a {
    text-decoration: none;
    font-size: 0.78rem;
    font-weight: 600;
    color: var(--text-light);
    padding: 9px 16px;
    border-radius: 30px;
    border: 1.5px solid transparent;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    transition: all 0.25s ease;
    background: rgba(255,255,255,0.04);
  }
  .social-links a.fb { border-color: var(--neon-cyan); }
  .social-links a.fb:hover { box-shadow: 0 0 15px rgba(0,245,255,0.6); color: var(--neon-cyan); }
  .social-links a.ig { border-color: var(--neon-pink); }
  .social-links a.ig:hover { box-shadow: 0 0 15px rgba(255,0,230,0.6); color: var(--neon-pink); }
  .social-links a.wa { border-color: var(--neon-green); }
  .social-links a.wa:hover { box-shadow: 0 0 15px rgba(57,255,20,0.6); color: var(--neon-green); }

  @media (max-width: 720px) {
    .table-wrap { display: none; }
    .mobile-list { display: block; }
    .container { padding: 18px; border-radius: 16px; }
    h1.heading { letter-spacing: 1px; }
  }

  /* Floating physics symbols */
  .symbols-bg {
    position: fixed;
    inset: 0;
    z-index: 0;
    overflow: hidden;
    pointer-events: none;
  }
  .symbol {
    position: absolute;
    bottom: -60px;
    font-size: 2rem;
    opacity: 0.18;
    animation: floatUp linear infinite;
    filter: drop-shadow(0 0 6px rgba(0,245,255,0.4));
  }
  @keyframes floatUp {
    0% {
      transform: translateY(0) translateX(0) rotate(0deg);
      opacity: 0;
    }
    10% { opacity: 0.22; }
    50% { transform: translateY(-50vh) translateX(20px) rotate(180deg); }
    90% { opacity: 0.22; }
    100% {
      transform: translateY(-105vh) translateX(-20px) rotate(360deg);
      opacity: 0;
    }
  }
</style>
</head>
<body>
<div class="symbols-bg" id="symbolsBg"></div>
<div class="container">
  <h1 class="heading">CGPA Calculator</h1>
  <p class="subheading">প্রতিটা কোর্সের Expected GPA বাটন দিয়ে চেঞ্জ করো — CGPA সাথে সাথে আপডেট হবে</p>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Course No.</th>
          <th>Course Title</th>
          <th>Credit</th>
          <th>Expected GPA</th>
          <th>Grade Point</th>
        </tr>
      </thead>
      <tbody id="courseBody"></tbody>
      <tfoot>
        <tr>
          <td colspan="2">Total</td>
          <td id="totalCredit"></td>
          <td>—</td>
          <td id="totalPoints"></td>
        </tr>
      </tfoot>
    </table>
  </div>

  <div class="mobile-list" id="mobileList"></div>

  <div class="result">
    <div class="result-label">YOUR CGPA</div>
    <div class="result-value" id="cgpaResult">0.00</div>
    <div class="result-sub" id="resultSub">Total Credit: 0 | Total Grade Points: 0</div>
  </div>

  <div class="footer">
    <div class="made-by">CREATED BY <span>SAMI</span></div>
    <div class="social-links">
      <a class="fb" href="https://fb.com/sami.ku.phy" target="_blank">📘 Facebook</a>
      <a class="ig" href="https://instagram.com/sami.ku.phy" target="_blank">📷 Instagram</a>
      <a class="wa" href="https://wa.me/8801943714866" target="_blank">💬 WhatsApp</a>
    </div>
  </div>
</div>

<script>
const courses = [
  ["0533 17 Phy 1201", "Mathematical Methods in Physics - I", 3],
  ["0533 17 Phy 1202", "Heat and Thermodynamics Lab", 0.75],
  ["0533 17 Phy 1203", "Heat and Thermodynamics", 3],
  ["0533 17 Phy 1204", "Electricity Lab - I", 0.75],
  ["0533 17 Phy 1205", "Electricity and Magnetism", 3],
  ["0533 17 Phy 1206", "Viva-voce-I", 0.5],
  ["0541 17 Math 1251", "Geometry in Two and Three Dimensions", 3],
  ["0531 17 Chem 1253", "Inorganic and Organic Chemistry", 2],
  ["0531 17 Chem 1254", "Chemistry Sessional - II", 0.75],
  ["0714 17 CSE 1257", "Computer Fundamentals", 2],
  ["0714 17 CSE 1258", "Computer Fundamentals Sessional", 1.5],
];

const gpaValues = courses.map(() => 4.00);

const tbody = document.getElementById('courseBody');
const mobileList = document.getElementById('mobileList');

courses.forEach((c, i) => {
  const [code, title, credit] = c;

  const row = document.createElement('tr');
  row.innerHTML = `
    <td class="code">${code}</td>
    <td class="title">${title}</td>
    <td>${credit}</td>
    <td>
      <div class="gpa-control">
        <button class="gpa-btn minus" onclick="changeGPA(${i}, -0.25)">−</button>
        <div class="gpa-value" id="gpa${i}">4.00</div>
        <button class="gpa-btn plus" onclick="changeGPA(${i}, 0.25)">+</button>
      </div>
    </td>
    <td id="point${i}">${(credit*4).toFixed(2)}</td>
  `;
  tbody.appendChild(row);

  const card = document.createElement('div');
  card.className = 'course-card';
  card.innerHTML = `
    <div class="ct-title">${title}</div>
    <div class="ct-meta">${code} • Credit: ${credit}</div>
    <div class="ct-row">
      <div class="gpa-control">
        <button class="gpa-btn minus" onclick="changeGPA(${i}, -0.25)">−</button>
        <div class="gpa-value" id="gpaM${i}">4.00</div>
        <button class="gpa-btn plus" onclick="changeGPA(${i}, 0.25)">+</button>
      </div>
      <div class="ct-point" id="pointM${i}">${(credit*4).toFixed(2)} pts</div>
    </div>
  `;
  mobileList.appendChild(card);
});

function changeGPA(i, delta) {
  let val = gpaValues[i] + delta;
  if (val > 4) val = 4;
  if (val < 0) val = 0;
  val = Math.round(val * 100) / 100;
  gpaValues[i] = val;
  calculate();
}

function calculate() {
  let totalCredit = 0;
  let totalPoints = 0;

  courses.forEach((c, i) => {
    const credit = c[2];
    const gpa = gpaValues[i];
    const point = credit * gpa;

    document.getElementById('gpa'+i).textContent = gpa.toFixed(2);
    document.getElementById('gpaM'+i).textContent = gpa.toFixed(2);
    document.getElementById('point'+i).textContent = point.toFixed(2);
    document.getElementById('pointM'+i).textContent = point.toFixed(2) + ' pts';

    totalCredit += credit;
    totalPoints += point;
  });

  document.getElementById('totalCredit').textContent = totalCredit.toFixed(2);
  document.getElementById('totalPoints').textContent = totalPoints.toFixed(2);

  const cgpa = totalCredit > 0 ? totalPoints / totalCredit : 0;
  document.getElementById('cgpaResult').textContent = cgpa.toFixed(2);
  document.getElementById('resultSub').textContent =
    `Total Credit: ${totalCredit.toFixed(2)} | Total Grade Points: ${totalPoints.toFixed(2)}`;
}

calculate();

// Floating physics symbols animation
const symbols = ['⚛️','🔬','📐','⚡','🧲','🔋','🌡️','📊','∑','π','∞','⚙️','🧪','💡','🔭','Δ','λ','Ω'];
const bg = document.getElementById('symbolsBg');
const count = 22;
for (let i = 0; i < count; i++) {
  const el = document.createElement('div');
  el.className = 'symbol';
  el.textContent = symbols[Math.floor(Math.random() * symbols.length)];
  el.style.left = Math.random() * 100 + 'vw';
  el.style.fontSize = (1.2 + Math.random() * 2) + 'rem';
  el.style.animationDuration = (12 + Math.random() * 18) + 's';
  el.style.animationDelay = (Math.random() * -25) + 's';
  bg.appendChild(el);
}
</script>
</body>
</html>
